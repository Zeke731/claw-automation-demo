<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ready to Level Up Your Workflow?</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f9fafb;
      color: #222;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 480px;
      margin: 7vh auto;
      background: #fff;
      padding: 2.5rem 2rem 2.5rem 2rem;
      border-radius: 18px;
      box-shadow: 0 10px 36px rgba(38,50,56,.1);    
      text-align: center;
    }
    h1 {
      color: #1672ec;
      margin-bottom: 0.7em;
    }
    p {
      margin-bottom: 2em;
      color: #333;
    }
    input[type="email"] {
      padding: 0.8em;
      border: 1px solid #ddd;
      border-radius: 7px;
      width: 70%;
      font-size: 1rem;
    }
    button {
      padding: 0.8em 1.4em;
      background: #1672ec;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 1rem;
      margin-left: 0.6em;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #005ecb; }
    .footer {
      color: #aaa;
      font-size: 0.95em;
      margin-top: 2em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ready to Level Up Your Workflow?</h1>
    <p>Join our insiders list for automation tips, new tools, and AI-driven productivity secrets. Get simple, actionable strategies sent straight to your inbox every week.</p>
    <form>
      <input type="email" required placeholder="Enter your email" />
      <button type="submit">Get Updates</button>
    </form>
    <div class="footer">We respect your privacy. No spam — ever.</div>
  </div>
</body>
</html>
